site_name: 打造你的 AI Agent
site_description: 用 Hermes Agent + Gemini + Telegram 從零開始
site_url: https://lopentu.github.io/hermes-agent-tutorial/

theme:
  name: material
  language: zh-TW
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.top
    - toc.follow

markdown_extensions:
  - toc:
      permalink: true
      title: 目錄
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
